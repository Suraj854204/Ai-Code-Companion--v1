services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api-gateway:
    build: { context: ., dockerfile: services/api-gateway/Dockerfile }
    ports: ["4000:4000"]
    env_file: .env
    environment:
      API_GATEWAY_PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      GITHUB_SERVICE_URL: http://github-service:4002
      AI_SERVICE_URL: http://ai-service:4003
      SCANNER_SERVICE_URL: http://scanner-service:4004
      REPORT_SERVICE_URL: http://report-service:4005
      NOTIFICATION_SERVICE_URL: http://notification-service:4006
    depends_on: [auth-service, github-service, ai-service, scanner-service, report-service, notification-service]

  auth-service:
    build: { context: ., dockerfile: services/auth-service/Dockerfile }
    ports: ["4001:4001"]
    env_file: .env
    environment: { AUTH_SERVICE_PORT: 4001 }

  github-service:
    build: { context: ., dockerfile: services/github-service/Dockerfile }
    ports: ["4002:4002"]
    env_file: .env
    environment: { GITHUB_SERVICE_PORT: 4002, REDIS_URL: redis://redis:6379 }
    depends_on: [redis]

  ai-service:
    build: { context: ., dockerfile: services/ai-service/Dockerfile }
    ports: ["4003:4003"]
    env_file: .env
    environment: { AI_SERVICE_PORT: 4003 }

  scanner-service:
    build: { context: ., dockerfile: services/scanner-service/Dockerfile }
    ports: ["4004:4004"]
    env_file: .env
    environment:
      SCANNER_SERVICE_PORT: 4004
      GITHUB_SERVICE_URL: http://github-service:4002
      AI_SERVICE_URL: http://ai-service:4003
    depends_on: [github-service, ai-service]

  report-service:
    build: { context: ., dockerfile: services/report-service/Dockerfile }
    ports: ["4005:4005"]
    env_file: .env
    environment: { REPORT_SERVICE_PORT: 4005 }

  notification-service:
    build: { context: ., dockerfile: services/notification-service/Dockerfile }
    ports: ["4006:4006"]
    env_file: .env
    environment: { NOTIFICATION_SERVICE_PORT: 4006 }

  web-app:
    build: { context: ., dockerfile: frontends/web-app/Dockerfile }
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on: [api-gateway]

  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api-gateway, web-app]
